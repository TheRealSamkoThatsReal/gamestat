name: build & release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset: gamestat-linux-x86_64
          - os: windows-latest
            asset: gamestat-windows-x86_64.exe
          - os: macos-latest
            asset: gamestat-macos-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      # ---- Linux: lean report/CLI binary (no bundled webview) ----
      # A GTK/WebKit or Qt browser engine can't be bundled into a portable
      # cross-distro binary via PyInstaller (GLib ABI skew / 400 MB Qt). Linux
      # ships the small CLI/report binary; `gamestat app` uses system pywebview.
      - name: Linux — build deps
        if: runner.os == 'Linux'
        run: python3 -m pip install --break-system-packages --upgrade pyinstaller

      # ---- Windows / macOS: setup-python + wheel backends ----
      - uses: actions/setup-python@v5
        if: runner.os != 'Linux'
        with:
          python-version: "3.12"
      - name: Windows — WebView2 backend deps
        if: runner.os == 'Windows'
        run: python -m pip install --upgrade pyinstaller pywebview pythonnet
      - name: macOS — Cocoa backend deps
        if: runner.os == 'macOS'
        run: |
          python -m pip install --upgrade pyinstaller pywebview \
            pyobjc-core pyobjc-framework-Cocoa pyobjc-framework-WebKit pyobjc-framework-Quartz

      # ---- Build the GUI-enabled binary ----
      - name: Build binary (Linux)
        if: runner.os == 'Linux'
        run: python3 -m PyInstaller --onefile --noconfirm --name gamestat gamestat.py

      - name: Build binary (Windows / macOS)
        if: runner.os != 'Linux'
        shell: bash
        run: python -m PyInstaller --onefile --noconfirm --name gamestat
             --collect-all webview gamestat.py

      # A second, windowed (no-console) exe for the GUI, so launching the app
      # doesn't pop a command prompt. gamestat.exe stays console for the CLI.
      - name: Windows — build windowed app exe
        if: runner.os == 'Windows'
        shell: bash
        run: python -m PyInstaller --onefile --noconfirm --windowed --name gamestat-app
             --icon packaging/assets/icon.ico --collect-all webview gamestat.py

      - name: Stage raw binary
        shell: bash
        run: |
          mkdir -p out
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp dist/gamestat.exe "out/${{ matrix.asset }}"
            cp dist/gamestat-app.exe "out/gamestat-app-windows-x86_64.exe"
          else
            cp dist/gamestat "out/${{ matrix.asset }}"
          fi

      # ---- Windows: build the Inno Setup installer ----
      - name: Windows — build installer (Inno Setup)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) { choco install innosetup -y --no-progress }
          $ver = "${{ github.ref_name }}".TrimStart('v')
          if ([string]::IsNullOrEmpty($ver)) { $ver = "0.0.0" }
          & $iscc "/DMyAppVersion=$ver" installer\gamestat.iss
          Copy-Item installer-out\gamestat-setup-x64.exe out\gamestat-setup-x64.exe

      # ---- Linux: build the ratatui TUI (Rust) ----
      - name: Linux — build TUI (Rust/ratatui)
        if: runner.os == 'Linux'
        run: |
          cargo build --release --manifest-path tui/Cargo.toml
          cp tui/target/release/gamestat-tui out/gamestat-tui-linux-x86_64

      # ---- Linux: build the desktop tarball (bundles the TUI too) ----
      - name: Linux — build tarball
        if: runner.os == 'Linux'
        run: bash packaging/linux/make-tarball.sh "${{ github.ref_name }}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: out/*

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          fail_on_unmatched_files: true
          generate_release_notes: true
