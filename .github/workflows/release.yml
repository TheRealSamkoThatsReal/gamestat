name: build & release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset: gamestat-linux-x86_64
          - os: windows-latest
            asset: gamestat-windows-x86_64.exe
          - os: macos-latest
            asset: gamestat-macos-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyInstaller
        run: python -m pip install --upgrade pip pyinstaller

      - name: Build standalone binary
        run: pyinstaller --onefile --name gamestat gamestat.py

      - name: Stage artifact
        shell: bash
        run: |
          mkdir -p out
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp dist/gamestat.exe "out/${{ matrix.asset }}"
          else
            cp dist/gamestat "out/${{ matrix.asset }}"
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: out/${{ matrix.asset }}

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: out/${{ matrix.asset }}
          fail_on_unmatched_files: true
